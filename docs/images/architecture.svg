<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
  </defs>
  <rect width="800" height="400" fill="url(#bg)" rx="12"/>
  <text x="400" y="35" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600" fill="#ffffff" text-anchor="middle">Architecture Overview</text>
  
  <!-- Row 1: Input -->
  <rect x="30" y="60" width="140" height="55" rx="10" fill="#1a1e2e" stroke="#e94560" stroke-width="1.5"/>
  <text x="100" y="83" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600" fill="#e94560" text-anchor="middle">📄 Code Files</text>
  <text x="100" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">.py .js .ts .java</text>

  <!-- Arrow -->
  <line x1="170" y1="87" x2="210" y2="87" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#e94560"/></marker></defs>

  <!-- File Reader -->
  <rect x="215" y="60" width="130" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="280" y="83" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">File Reader</text>
  <text x="280" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Size validation</text>

  <line x1="345" y1="87" x2="385" y2="87" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Language Detector -->
  <rect x="390" y="60" width="130" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="455" y="83" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Lang Detector</text>
  <text x="455" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Extension mapping</text>

  <line x1="520" y1="87" x2="560" y2="87" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Code Numbering -->
  <rect x="565" y="60" width="130" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="630" y="83" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Line Numbering</text>
  <text x="630" y="100" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Code annotation</text>

  <!-- Arrow down -->
  <line x1="630" y1="115" x2="630" y2="155" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Row 2: LLM Processing -->
  <rect x="250" y="160" width="160" height="60" rx="10" fill="#1a1e2e" stroke="#e94560" stroke-width="2"/>
  <text x="330" y="185" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#e94560" text-anchor="middle">🤖 Ollama LLM</text>
  <text x="330" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">Local AI Processing</text>

  <rect x="480" y="160" width="150" height="60" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="555" y="185" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Prompt Builder</text>
  <text x="555" y="205" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Focus areas + context</text>

  <line x1="480" y1="190" x2="410" y2="190" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <line x1="630" y1="155" x2="630" y2="190" stroke="#30363d" stroke-width="1"/>
  <line x1="630" y1="190" x2="630" y2="190" stroke="#30363d" stroke-width="1"/>

  <!-- Arrow down from LLM -->
  <line x1="330" y1="220" x2="330" y2="260" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Row 3: Output -->
  <rect x="30" y="265" width="140" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="100" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Auto-Fix Gen</text>
  <text x="100" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Corrected code</text>

  <rect x="210" y="265" width="140" height="55" rx="10" fill="#1a1e2e" stroke="#e94560" stroke-width="1.5"/>
  <text x="280" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#e94560" text-anchor="middle">Review Parser</text>
  <text x="280" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Issue extraction</text>

  <line x1="350" y1="292" x2="390" y2="292" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="395" y="265" width="140" height="55" rx="10" fill="#1a1e2e" stroke="#30363d" stroke-width="1"/>
  <text x="465" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#ffffff" text-anchor="middle">Severity Scoring</text>
  <text x="465" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Critical/Warning/Info</text>

  <line x1="535" y1="292" x2="575" y2="292" stroke="#e94560" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <rect x="580" y="265" width="140" height="55" rx="10" fill="#1a1e2e" stroke="#e94560" stroke-width="1.5"/>
  <text x="650" y="288" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="600" fill="#e94560" text-anchor="middle">📊 Report Export</text>
  <text x="650" y="305" font-family="Segoe UI, Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Markdown / JSON</text>

  <line x1="210" y1="292" x2="170" y2="292" stroke="#30363d" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- Footer -->
  <rect x="30" y="345" width="740" height="40" rx="8" fill="#161b22" stroke="#30363d" stroke-width="0.5"/>
  <text x="400" y="370" font-family="Segoe UI, Arial, sans-serif" font-size="11" fill="#8b949e" text-anchor="middle">🔒 100% Local Processing • No code leaves your machine • Powered by Ollama</text>
</svg>
