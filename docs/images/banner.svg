    <path d="M25 32 L65 32" stroke="#e94560" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  </g>
  <!-- Title -->
  <text x="170" y="85" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700" fill="#ffffff">Code Review Bot</text>
